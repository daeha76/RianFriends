name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test tests/RianFriends.Domain.Tests \
            --no-build --configuration Release \
            --filter "Category=Unit" \
            --logger "trx;LogFileName=domain-results.trx" \
            --collect:"XPlat Code Coverage"

          dotnet test tests/RianFriends.Application.Tests \
            --no-build --configuration Release \
            --filter "Category=Unit" \
            --logger "trx;LogFileName=application-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Run Architecture Tests
        run: |
          dotnet test tests/RianFriends.Architecture.Tests \
            --no-build --configuration Release \
            --filter "Category=Architecture" \
            --logger "trx;LogFileName=arch-results.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: '**/coverage.cobertura.xml'
